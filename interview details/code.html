<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e2e8f0",
                        "background-light": "#f8f7f5",
                        "background-dark": "#121212",
                        "surface-dark": "#1E1E1E",
                        "border-dark": "#2d2d2d",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",

                    },
                },
            },

<title>Interview Details</title>
<style>
    body {
      min-height: max(884px, 100dvh);

<body class="bg-background-light font-display text-slate-900 dark:text-slate-100 min-h-screen dark:bg-background-dark">
<!-- Main Container -->
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark relative overflow-hidden">
<!-- Top Navigation -->
<header class="flex items-center justify-between p-6 pb-2">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-slate-200 border border-white/10">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold flex-1 text-center pr-10">Interview Details</h1>
</header>
<!-- Skill Visualization Section (Replacing Map) -->
<div class="px-6 py-4">
<div class="bg-slate-100 dark:bg-surface-dark rounded-xl p-6 border border-slate-200 dark:border-border-dark">

<div class="grid grid-cols-4 gap-4 items-end h-32">

<span class="text-[10px] font-bold text-slate-500 dark:text-slate-400">Python</span>
</div>
<div class="flex flex-col items-center gap-2 h-full justify-end">
<div class="w-full bg-slate-500 rounded-t-lg" style="height: 75%;"></div>
<span class="text-[10px] font-bold text-slate-500 dark:text-slate-400">FastAPI</span>
</div>
<div class="flex flex-col items-center gap-2 h-full justify-end">
<div class="w-full bg-slate-700 rounded-t-lg" style="height: 60%;"></div>
<span class="text-[10px] font-bold text-slate-500 dark:text-slate-400">SQL</span>
</div>
<div class="flex flex-col items-center gap-2 h-full justify-end">
<div class="w-full bg-slate-400 rounded-t-lg" style="height: 90%;"></div>
<span class="text-[10px] font-bold text-slate-500 dark:text-slate-400">System</span>
</div>
</div>
</div>
</div>
<!-- Details Card -->
<div class="px-6 flex-1">
<div class="bg-white dark:bg-surface-dark rounded-xl p-6 shadow-sm border border-slate-100 dark:border-border-dark">
<!-- Header Info -->
<div class="mb-6">
<h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white mb-1">INT-123456</h2>
<div class="flex items-center gap-2">
<p class="text-lg font-semibold text-slate-700 dark:text-slate-200">Backend Developer</p>
<span class="text-slate-400 dark:text-primary/40">•</span>
<p class="text-slate-400 font-medium">TechNova</p>
</div>
</div>
<div class="h-px bg-slate-100 dark:bg-border-dark w-full mb-6"></div>
<!-- Grid Details -->
<div class="grid grid-cols-2 gap-y-6">
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">Duration</p>
<p class="font-bold text-slate-900 dark:text-white">10–15 minutes</p>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">Type</p>
<p class="font-bold text-slate-900 dark:text-white">Technical Round</p>
</div>
<div class="col-span-2">
<p class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-1">Skills Tested</p>

<span class="px-3 py-1 bg-slate-100 dark:bg-white/10 text-xs font-bold rounded-full text-slate-300 border border-white/5">SQL</span>
<span class="px-3 py-1 bg-slate-100 dark:bg-white/10 text-xs font-bold rounded-full text-slate-300 border border-white/5">API Design</span>
</div>
</div>
</div>
</div>

<div class="mt-6 bg-white dark:bg-surface-dark rounded-xl p-4 flex items-center justify-between border border-slate-100 dark:border-border-dark">

<div class="absolute -bottom-1 -right-1 size-4 bg-green-500 border-2 border-white dark:border-background-dark rounded-full"></div>
</div>
<div>
<p class="text-xs text-slate-500 dark:text-slate-400">Interviewer</p>
<h3 class="font-bold text-slate-900 dark:text-white">AI Recruiter</h3>
</div>
</div>
<div class="flex gap-2">
<button class="size-10 rounded-full bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-slate-300 flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-xl">chat_bubble</span>
</button>
<button class="size-10 rounded-full bg-slate-100 dark:bg-white/10 text-slate-900 dark:text-slate-300 flex items-center justify-center border border-white/5">
<span class="material-symbols-outlined text-xl">call</span>
</button>
</div>
</div>
</div>
<!-- Footer Button -->
<footer class="p-6 mt-auto">
<button class="w-full bg-gradient-to-r from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 transition-all text-white font-bold py-4 rounded-xl text-lg shadow-lg shadow-black/20 flex items-center justify-center gap-2 border border-white/10">
<span>Start AI Interview</span>
<span class="material-symbols-outlined">play_circle</span>
</button>
</footer>
</div>
</body></html>
